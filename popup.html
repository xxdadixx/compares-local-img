<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { width: 240px; padding: 12px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; }
    h3 { margin-top: 0; color: #262626; font-size: 14px; margin-bottom: 4px; }
    #targetProfile { font-size: 12px; color: #0095f6; font-weight: bold; margin-bottom: 12px; word-break: break-all; }
    .btn { display: block; width: 100%; padding: 8px; margin-top: 8px; background: #0095f6; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;}
    .btn:hover { background: #1877f2; }
    .btn:disabled { background: #cccccc; cursor: not-allowed; }
    #status { margin-top: 8px; font-size: 12px; color: #8e8e8e; text-align: center; }
    
    #progressContainer { display: none; margin-top: 10px; background: #f0f0f0; border-radius: 4px; overflow: hidden; height: 16px; position: relative; }
    #progressBar { height: 100%; width: 0%; background: #0095f6; transition: width 0.1s ease; }
    #progressText { position: absolute; width: 100%; text-align: center; font-size: 10px; color: #262626; line-height: 16px; font-weight: bold; top: 0; left: 0; }
  </style>
</head>
<body>
  <h3>Current Target Profile:</h3>
  <div id="targetProfile">Detecting profile...</div>

  <label style="font-size: 12px; color: #262626;">Select folder for this user:</label>
  <input type="file" id="imageInput" webkitdirectory directory multiple accept="image/*" style="margin-top: 4px; width: 100%;" disabled>
  
  <button id="syncBtn" class="btn" disabled>Scan Profile</button>
  
  <div id="progressContainer">
    <div id="progressBar"></div>
    <div id="progressText">0 / 0</div>
  </div>

  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
